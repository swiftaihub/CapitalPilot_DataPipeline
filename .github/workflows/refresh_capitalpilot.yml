name: Refresh CapitalPilot Pipeline

on:
  workflow_dispatch:
    inputs:
      political_source:
        description: Political disclosure source to refresh.
        required: false
        default: all
        type: choice
        options:
          - manual
          - house
          - senate
          - oge
          - all
      political_max_reports:
        description: Maximum political disclosure reports to fetch per source.
        required: false
        default: 50
        type: number
  schedule:
    # GitHub Actions cron uses UTC.
    # 22:00 UTC is 5:00 PM EST, Monday through Friday.
    - cron: "0 22 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CAPITALPILOT_DB_TARGET: motherduck
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      POLITICAL_SOURCE: ${{ github.event.inputs.political_source || 'all' }}
      POLITICAL_MAX_REPORTS: ${{ github.event.inputs.political_max_reports || '50' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dbt profiles.yml
        run: |
          cp dbt/profiles.yml.example dbt/profiles.yml

      - name: Validate dbt connection
        working-directory: dbt
        run: |
          dbt debug --profiles-dir . --target prod

      - name: Run orchestrated data pipeline
        run: |
          python jobs/run_pipeline.py --target motherduck --run-dbt --political-source "${POLITICAL_SOURCE}" --political-max-reports "${POLITICAL_MAX_REPORTS}"

      - name: Generate dbt docs
        working-directory: dbt
        run: |
          dbt docs generate --profiles-dir . --target prod

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            dbt/target/manifest.json
            dbt/target/run_results.json
            dbt/target/catalog.json

