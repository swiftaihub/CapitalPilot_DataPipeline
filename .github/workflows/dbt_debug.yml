name: dbt Debug and Build Selected Models

on:
  workflow_dispatch:
    inputs:
      selector:
        description: "dbt selector, e.g. mart_macro_dashboard or +mart_valuation_dashboard"
        required: false
        default: "marts"

jobs:
  dbt-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dbt profiles.yml
        run: |
          cp dbt/profiles.yml.example dbt/profiles.yml

      - name: dbt debug
        working-directory: dbt
        run: |
          dbt debug --profiles-dir . --target prod

      - name: dbt build selected
        working-directory: dbt
        run: |
          dbt build --profiles-dir . --target prod --select "${{ github.event.inputs.selector }}"

