version: 2

models:
  - name: stg_macro_observations
    description: "Cleaned FRED macro observations."
    columns:
      - name: series_id
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: stg_prices
    description: "Cleaned daily market price data."
    columns:
      - name: ticker
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: stg_sec_filings
    description: "Cleaned SEC filing metadata."

  - name: stg_sec_filing_documents
    description: "Cleaned SEC filing document downloads."

  - name: stg_news_articles
    description: "Cleaned configurable news article metadata."

  - name: stg_political_transactions
    description: "Cleaned public political and official transaction disclosures."

  - name: stg_options_chain
    description: "Cleaned option-chain rows."

